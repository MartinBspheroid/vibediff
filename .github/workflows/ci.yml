name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  backend:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      # Go build/test compiles main.go which //go:embed's web/dist; pull the
      # built assets from the frontend job so embedding succeeds.
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - run: go vet ./...
      - run: go test -race ./...
      # golangci-lint-action v7+ is required for golangci-lint v2 config
      # (.golangci.yml is version: "2"); v6 only understands v1. Pin the
      # binary to the version used locally for reproducible lint runs.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Build vibediff binary
        run: go build -o vibediff .
        working-directory: .
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report
